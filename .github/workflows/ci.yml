name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: tomcosmos
          miniforge-version: latest

      - name: Install package (editable)
        run: pip install -e .

      - name: Lint
        run: ruff check .

      - name: Type-check (state only)
        run: mypy src/tomcosmos/state
        continue-on-error: true

      - name: Fetch base kernel (de440s)
        # `tomcosmos run` instantiates an EphemerisSource by default, which
        # lazily downloads de440s.bsp if absent. Under `pytest -n auto` two
        # workers would race to write the same file; on Windows that race
        # fails with WinError 5 (rename to existing file). Fetch once up
        # front so the parallel test runners only read.
        run: tomcosmos fetch-kernels

      - name: Tests
        run: pytest -n auto -m "not ephemeris and not viewer"
