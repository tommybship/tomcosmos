name: tomcosmos
channels:
  - conda-forge
dependencies:
  - python=3.12
  # runtime
  - numpy>=1.26,<3
  - scipy>=1.11,<2
  # rebound is NOT on conda-forge for win-64 (POSIX-only C build); installed
  # via pip below from pyproject.toml, which pulls prebuilt wheels from PyPI.
  - astropy>=6,<8
  - skyfield>=1.48,<2
  - astroquery>=0.4.6
  - pydantic>=2.5,<3
  - pyyaml>=6.0,<7
  - typer>=0.12,<1
  - structlog>=24,<26
  - pyarrow>=15,<20
  - pandas>=2.2,<3
  # Slider + label-tracking verified on this exact pair. Bump only after
  # re-running tests/test_viewer.py and `tomcosmos view` against a real
  # parquet — pyvista has had slider regressions on newer releases.
  - pyvista=0.43.10
  - vtk=9.3.1
  # dev
  - pytest>=8,<9
  - pytest-xdist>=3.5,<4
  - pytest-mpl>=0.17,<1
  - mypy>=1.10
  - ruff>=0.5
  - pip
  - pip:
      - -e .
      # REBOUNDx — optional GR / SRP / Yarkovsky / tides / ... forces.
      # We install from our fork's Windows-MSVC branch, which is a
      # superset of upstream (same behavior on Linux/macOS, plus the
      # build fixes Windows needs). When upstream merges the patches
      # we switch this back to `reboundx>=4.6,<5` from PyPI.
      # Tracks https://github.com/dtamayo/reboundx/issues/137 et al.
      - git+https://github.com/tommybship/reboundx.git@windows-msvc-build
      # ASSIST — JPL high-precision ephemeris-aware integrator (built
      # on REBOUND). Scenarios with `integrator.ephemeris_perturbers=True`
      # use it; everything else continues to use vanilla REBOUND. Same
      # Windows-MSVC build saga as REBOUNDx, so we install from our fork
      # at the matching branch. Upstream
      # (https://github.com/matthewholman/assist) has no Windows port;
      # we have not opened a PR.
      - git+https://github.com/tommybship/assist.git@windows-msvc-build
