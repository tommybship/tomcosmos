name: tomcosmos
channels:
  - conda-forge
dependencies:
  - python=3.12
  # runtime
  - numpy>=1.26,<3
  - scipy>=1.11,<2
  # rebound is NOT on conda-forge for win-64 (POSIX-only C build); installed
  # via pip below from pyproject.toml, which pulls prebuilt wheels from PyPI.
  - astropy>=6,<8
  - skyfield>=1.48,<2
  - spiceypy>=6,<8
  - astroquery>=0.4.6
  - pydantic>=2.5,<3
  - pyyaml>=6.0,<7
  - typer>=0.12,<1
  - structlog>=24,<26
  - pyarrow>=15,<20
  - pandas>=2.2,<3
  - pyvista>=0.43,<1
  - trame>=3.5,<4
  # dev
  - pytest>=8,<9
  - pytest-xdist>=3.5,<4
  - pytest-mpl>=0.17,<1
  - mypy>=1.10
  - ruff>=0.5
  - pip
  - pip:
      - -e .
